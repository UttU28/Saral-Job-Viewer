name: Destroy All Saral Stack (Cloud Run + Redis + Scheduler + optional LB)

# Job DAG: validateConfirm → approvalGate → destroyLoadBalancer (optional) → destroyCloudRunApi ∥ destroyCloudRunUi → destroyValidationStack → destroyDomainMappings (optional) → destroyRedisThenVpc → destroySummary (always)

on:
  workflow_dispatch:
    inputs:
      confirmText:
        description: Type DESTROY_SARAL_STACK to continue
        required: true
        type: string
      deleteGlobalLoadBalancer:
        description: Delete global HTTPS LB — resource names match deployment.yml ensureGlobalLoadBalancer
        required: true
        default: false
        type: boolean
      deleteDomainMappings:
        description: Also delete custom domain mappings (beta)
        required: true
        default: false
        type: boolean
      deleteRedis:
        description: Delete Memorystore instance
        required: true
        default: true
        type: boolean
      deleteVpcConnector:
        description: Delete Serverless VPC connector
        required: true
        default: true
        type: boolean

env:
  GCP_PROJECT_ID: saraljobviewer
  GCP_REGION: us-east1
  API_SERVICE_NAME: saral-api
  UI_SERVICE_NAME: saral-ui
  RUN_JOB_NAME: saral-dvalidate-job
  SCHEDULER_JOB_NAME: saral-dvalidate-midnight-utc
  REDIS_INSTANCE_ID: saral-memorystore-redis
  VPC_CONNECTOR_NAME: sjv-run-vpc
  UI_DOMAIN: saral.thatinsaneguy.com
  API_DOMAIN: saralapi.thatinsaneguy.com
  LB_IP_NAME: sjv-global-lb-ip
  LB_CERT_NAME: sjv-managed-cert
  LB_UI_NEG_NAME: sjv-ui-neg
  LB_API_NEG_NAME: sjv-api-neg
  LB_UI_BACKEND_NAME: sjv-ui-bes
  LB_API_BACKEND_NAME: sjv-api-bes
  LB_URL_MAP_NAME: sjv-host-routing
  LB_HTTPS_PROXY_NAME: sjv-https-proxy
  LB_HTTP_PROXY_NAME: sjv-http-proxy
  LB_HTTPS_FWD_RULE_NAME: sjv-https-fr
  LB_HTTP_FWD_RULE_NAME: sjv-http-fr

jobs:
  validateConfirm:
    name: Validate confirmation phrase
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destructive action
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirmText }}" != "DESTROY_SARAL_STACK" ]]; then
            echo "Confirmation text mismatch. Type exactly: DESTROY_SARAL_STACK"
            exit 1
          fi
          echo "Confirmation phrase OK."

  approvalGate:
    name: Approval Required (Destroy)
    runs-on: ubuntu-latest
    needs: validateConfirm
    environment:
      name: production-approval
    steps:
      - name: Human approval recorded
        run: echo "Destroy approved. Proceeding with teardown jobs."

  destroyLoadBalancer:
    name: Destroy global HTTPS LB
    runs-on: ubuntu-latest
    needs: approvalGate
    if: inputs.deleteGlobalLoadBalancer
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete global HTTPS load balancer
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ env.GCP_PROJECT_ID }}"
          REGION="${{ env.GCP_REGION }}"

          delete_fwd() {
            local name="$1"
            if gcloud compute forwarding-rules describe "$name" --global --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute forwarding-rules delete "$name" --global --project "$PROJECT" --quiet
              echo "Deleted forwarding rule: $name"
            else
              echo "Forwarding rule not found (skip): $name"
            fi
          }

          delete_proxy_https() {
            if gcloud compute target-https-proxies describe "${{ env.LB_HTTPS_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute target-https-proxies delete "${{ env.LB_HTTPS_PROXY_NAME }}" --project "$PROJECT" --quiet
              echo "Deleted HTTPS target proxy."
            else
              echo "HTTPS target proxy not found (skip)."
            fi
          }

          delete_proxy_http() {
            if gcloud compute target-http-proxies describe "${{ env.LB_HTTP_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute target-http-proxies delete "${{ env.LB_HTTP_PROXY_NAME }}" --project "$PROJECT" --quiet
              echo "Deleted HTTP target proxy."
            else
              echo "HTTP target proxy not found (skip)."
            fi
          }

          delete_url_map() {
            if gcloud compute url-maps describe "${{ env.LB_URL_MAP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute url-maps delete "${{ env.LB_URL_MAP_NAME }}" --global --project "$PROJECT" --quiet
              echo "Deleted URL map."
            else
              echo "URL map not found (skip)."
            fi
          }

          delete_backend() {
            local name="$1"
            if gcloud compute backend-services describe "$name" --global --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute backend-services delete "$name" --global --project "$PROJECT" --quiet
              echo "Deleted backend service: $name"
            else
              echo "Backend service not found (skip): $name"
            fi
          }

          delete_neg() {
            local name="$1"
            if gcloud compute network-endpoint-groups describe "$name" --region "$REGION" --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute network-endpoint-groups delete "$name" --region "$REGION" --project "$PROJECT" --quiet
              echo "Deleted NEG: $name"
            else
              echo "NEG not found (skip): $name"
            fi
          }

          delete_cert() {
            if gcloud compute ssl-certificates describe "${{ env.LB_CERT_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute ssl-certificates delete "${{ env.LB_CERT_NAME }}" --global --project "$PROJECT" --quiet
              echo "Deleted SSL certificate."
            else
              echo "SSL certificate not found (skip)."
            fi
          }

          delete_ip() {
            if gcloud compute addresses describe "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
              gcloud compute addresses delete "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" --quiet
              echo "Deleted global static IP."
            else
              echo "Global IP not found (skip)."
            fi
          }

          echo "Tearing down global LB (order: forwarding rules → proxies → URL map → backends → NEGs → cert → IP)."
          delete_fwd "${{ env.LB_HTTP_FWD_RULE_NAME }}"
          delete_fwd "${{ env.LB_HTTPS_FWD_RULE_NAME }}"
          delete_proxy_https
          delete_proxy_http
          delete_url_map
          delete_backend "${{ env.LB_UI_BACKEND_NAME }}"
          delete_backend "${{ env.LB_API_BACKEND_NAME }}"
          delete_neg "${{ env.LB_UI_NEG_NAME }}"
          delete_neg "${{ env.LB_API_NEG_NAME }}"
          delete_cert
          delete_ip
          echo "Global LB teardown finished. Remove or update DNS A records for saral/saralapi if they still point at the old IP."

  destroyCloudRunApi:
    name: Destroy Cloud Run API
    runs-on: ubuntu-latest
    needs: [approvalGate, destroyLoadBalancer]
    if: ${{ needs.approvalGate.result == 'success' && (needs.destroyLoadBalancer.result == 'success' || needs.destroyLoadBalancer.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run API service
        shell: bash
        run: |
          set -euo pipefail
          SVC="${{ env.API_SERVICE_NAME }}"
          if gcloud run services describe "$SVC" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud run services delete "$SVC" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted service: $SVC"
          else
            echo "Service not found (skip): $SVC"
          fi

  destroyCloudRunUi:
    name: Destroy Cloud Run UI
    runs-on: ubuntu-latest
    needs: [approvalGate, destroyLoadBalancer]
    if: ${{ needs.approvalGate.result == 'success' && (needs.destroyLoadBalancer.result == 'success' || needs.destroyLoadBalancer.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run UI service
        shell: bash
        run: |
          set -euo pipefail
          SVC="${{ env.UI_SERVICE_NAME }}"
          if gcloud run services describe "$SVC" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud run services delete "$SVC" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted service: $SVC"
          else
            echo "Service not found (skip): $SVC"
          fi

  destroyValidationStack:
    name: Destroy validation job + Scheduler
    runs-on: ubuntu-latest
    needs: [approvalGate, destroyLoadBalancer, destroyCloudRunApi, destroyCloudRunUi]
    if: ${{ needs.approvalGate.result == 'success' && (needs.destroyLoadBalancer.result == 'success' || needs.destroyLoadBalancer.result == 'skipped') && needs.destroyCloudRunApi.result == 'success' && needs.destroyCloudRunUi.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run job
        shell: bash
        run: |
          set -euo pipefail
          if gcloud run jobs describe "${{ env.RUN_JOB_NAME }}" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud run jobs delete "${{ env.RUN_JOB_NAME }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted Cloud Run job: ${{ env.RUN_JOB_NAME }}"
          else
            echo "Cloud Run job not found (skip): ${{ env.RUN_JOB_NAME }}"
          fi

      - name: Delete Cloud Scheduler job
        shell: bash
        run: |
          set -euo pipefail
          if gcloud scheduler jobs describe "${{ env.SCHEDULER_JOB_NAME }}" --project "${{ env.GCP_PROJECT_ID }}" --location "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs delete "${{ env.SCHEDULER_JOB_NAME }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --location "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted Cloud Scheduler job: ${{ env.SCHEDULER_JOB_NAME }}"
          else
            echo "Scheduler job not found (skip): ${{ env.SCHEDULER_JOB_NAME }}"
          fi

  destroyDomainMappings:
    name: Destroy Cloud Run domain mappings
    runs-on: ubuntu-latest
    needs: [approvalGate, destroyLoadBalancer, destroyCloudRunApi, destroyCloudRunUi, destroyValidationStack]
    if: ${{ inputs.deleteDomainMappings && needs.approvalGate.result == 'success' && (needs.destroyLoadBalancer.result == 'success' || needs.destroyLoadBalancer.result == 'skipped') && needs.destroyCloudRunApi.result == 'success' && needs.destroyCloudRunUi.result == 'success' && needs.destroyValidationStack.result == 'success' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure gcloud beta commands are installed
        shell: bash
        run: |
          set -euo pipefail
          gcloud components install beta --quiet

      - name: Delete custom domain mappings
        shell: bash
        run: |
          set -euo pipefail
          for DOMAIN in "${{ env.UI_DOMAIN }}" "${{ env.API_DOMAIN }}"; do
            if gcloud beta run domain-mappings describe --domain "$DOMAIN" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
              gcloud beta run domain-mappings delete \
                --domain "$DOMAIN" \
                --project "${{ env.GCP_PROJECT_ID }}" \
                --region "${{ env.GCP_REGION }}" \
                --quiet
              echo "Deleted domain mapping: $DOMAIN"
            else
              echo "Domain mapping not found (skip): $DOMAIN"
            fi
          done

  destroyRedisThenVpc:
    name: Destroy Redis then VPC connector
    runs-on: ubuntu-latest
    needs: [approvalGate, destroyLoadBalancer, destroyCloudRunApi, destroyCloudRunUi, destroyValidationStack, destroyDomainMappings]
    if: ${{ needs.approvalGate.result == 'success' && (needs.destroyLoadBalancer.result == 'success' || needs.destroyLoadBalancer.result == 'skipped') && needs.destroyCloudRunApi.result == 'success' && needs.destroyCloudRunUi.result == 'success' && needs.destroyValidationStack.result == 'success' && (needs.destroyDomainMappings.result == 'success' || needs.destroyDomainMappings.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Skip Redis/VPC (both toggles off)
        if: ${{ !inputs.deleteRedis && !inputs.deleteVpcConnector }}
        run: echo "Skipping Redis and VPC teardown (inputs disabled)."

      - name: Delete Memorystore Redis (optional)
        if: inputs.deleteRedis
        shell: bash
        run: |
          set -euo pipefail
          if gcloud redis instances describe "${{ env.REDIS_INSTANCE_ID }}" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud redis instances delete "${{ env.REDIS_INSTANCE_ID }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted Redis instance: ${{ env.REDIS_INSTANCE_ID }}"
          else
            echo "Redis instance not found (skip): ${{ env.REDIS_INSTANCE_ID }}"
          fi

      - name: Delete Serverless VPC connector (optional)
        if: inputs.deleteVpcConnector
        shell: bash
        run: |
          set -euo pipefail
          if gcloud compute networks vpc-access connectors describe "${{ env.VPC_CONNECTOR_NAME }}" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud compute networks vpc-access connectors delete "${{ env.VPC_CONNECTOR_NAME }}" \
              --project "${{ env.GCP_PROJECT_ID }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
            echo "Deleted VPC connector: ${{ env.VPC_CONNECTOR_NAME }}"
          else
            echo "VPC connector not found (skip): ${{ env.VPC_CONNECTOR_NAME }}"
          fi

  destroySummary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validateConfirm
      - approvalGate
      - destroyLoadBalancer
      - destroyCloudRunApi
      - destroyCloudRunUi
      - destroyValidationStack
      - destroyDomainMappings
      - destroyRedisThenVpc
    steps:
      - name: Workflow outcome
        shell: bash
        env:
          VALIDATE: ${{ needs.validateConfirm.result }}
          APPROVAL: ${{ needs.approvalGate.result }}
          LB: ${{ needs.destroyLoadBalancer.result }}
          API: ${{ needs.destroyCloudRunApi.result }}
          UI: ${{ needs.destroyCloudRunUi.result }}
          VAL: ${{ needs.destroyValidationStack.result }}
          DM: ${{ needs.destroyDomainMappings.result }}
          REDIS_VPC: ${{ needs.destroyRedisThenVpc.result }}
        run: |
          set -euo pipefail
          echo "=== Destroy workflow finished ==="
          echo "validateConfirm: ${VALIDATE}"
          echo "approvalGate (production-approval): ${APPROVAL}"
          echo "destroyLoadBalancer: ${LB}"
          echo "destroyCloudRunApi: ${API}"
          echo "destroyCloudRunUi: ${UI}"
          echo "destroyValidationStack: ${VAL}"
          echo "destroyDomainMappings: ${DM}"
          echo "destroyRedisThenVpc: ${REDIS_VPC}"
          echo ""
          echo "Sequence: typed phrase → production-approval → optional LB → API + UI (parallel) → job + scheduler → optional mappings → optional Redis then VPC (one job)."
          echo "Skipped jobs are normal when inputs disable optional teardown."
