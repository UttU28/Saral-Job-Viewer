name: Main Deploy (Approval)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ensureGlobalLoadBalancer:
        description: After API/UI deploy steps, create/update global HTTPS LB (host routing + managed cert). Uncheck if LB not used.
        required: true
        default: true
        type: boolean

# Execution order (happy path):
#   detectChanges → approvalGate → [deployApi, deployFrontend, deployValidation] in parallel (each gated by path outputs)
#   → ensureGlobalLoadBalancer after deployApi AND deployFrontend finish (success or skipped — not failed)
# LB intentionally does not wait on deployValidation (no resource dependency).
env:
  GCP_PROJECT_ID: saraljobviewer
  GCP_REGION: us-east1
  AR_REPOSITORY: saral-job-viewer-cr
  MONGODB_DATABASE: saralJobViewer

  API_IMAGE_NAME: api
  API_SERVICE_NAME: saral-api
  RUN_JOB_NAME: saral-dvalidate-job

  FRONTEND_IMAGE_NAME: frontend
  UI_SERVICE_NAME: saral-ui
  VITE_API_URL_SECRET_ID: VITE_API_URL

  VALIDATION_IMAGE_NAME: dvalidate
  SCHEDULER_JOB_NAME: saral-dvalidate-midnight-utc
  UI_DOMAIN: saral.thatinsaneguy.com
  API_DOMAIN: saralapi.thatinsaneguy.com
  LB_IP_NAME: sjv-global-lb-ip
  LB_CERT_NAME: sjv-managed-cert
  LB_URL_MAP_NAME: sjv-host-routing
  LB_HTTPS_PROXY_NAME: sjv-https-proxy
  LB_HTTP_PROXY_NAME: sjv-http-proxy
  LB_HTTPS_FWD_RULE_NAME: sjv-https-fr
  LB_HTTP_FWD_RULE_NAME: sjv-http-fr
  LB_UI_NEG_NAME: sjv-ui-neg
  LB_API_NEG_NAME: sjv-api-neg
  LB_UI_BACKEND_NAME: sjv-ui-bes
  LB_API_BACKEND_NAME: sjv-api-bes

jobs:
  detectChanges:
    runs-on: ubuntu-latest
    outputs:
      apiChanged: ${{ steps.filter.outputs.api }}
      frontendChanged: ${{ steps.filter.outputs.frontend }}
      validationChanged: ${{ steps.filter.outputs.validation }}
      anyChanged: ${{ steps.filter.outputs.api == 'true' || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.validation == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed app areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'app.py'
              - 'utils/**'
              - 'requirements.txt'
              - 'docker/Dockerfile.api'
            frontend:
              - 'frontend/**'
              - 'docker/Dockerfile.frontend'
            validation:
              - 'validation.py'
              - 'aJobRight.py'
              - 'bGlassDoor.py'
              - 'cZipRecruiter.py'
              - 'utils/**'
              - 'requirements.txt'
              - 'docker/Dockerfile.validation'

  approvalGate:
    name: Approval Required (Utsav)
    runs-on: ubuntu-latest
    needs: detectChanges
    # workflow_dispatch: always enter approval so manual runs can refresh LB or redeploy even when path filter is empty vs base.
    if: needs.detectChanges.outputs.anyChanged == 'true' || github.event_name == 'workflow_dispatch'
    # Configure this environment in GitHub settings with required reviewer = Utsav.
    environment:
      name: production-approval
    steps:
      - name: Await approval
        run: echo "Deployment approved. Continuing with changed apps only."

  deployApi:
    runs-on: ubuntu-latest
    needs: [detectChanges, approvalGate]
    if: needs.detectChanges.outputs.apiChanged == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push API image
        id: buildAndPushImage
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.API_IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          FULL_IMAGE="${IMAGE_URI}:${IMAGE_TAG}"
          docker build -f docker/Dockerfile.api -t "${FULL_IMAGE}" .
          docker push "${FULL_IMAGE}"
          docker tag "${FULL_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"
          echo "fullImage=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy API Cloud Run service
        shell: bash
        run: |
          set -euo pipefail
          FULL_IMAGE="${{ steps.buildAndPushImage.outputs.fullImage }}"
          RUNTIME_SA="${{ secrets.GCP_API_RUN_SERVICE_ACCOUNT }}"
          VPC_NAME="${{ vars.GCP_VPC_CONNECTOR_NAME }}"
          EXTRA=()
          if [[ -n "$VPC_NAME" ]]; then
            EXTRA+=(--vpc-connector "$VPC_NAME" --vpc-egress private-ranges-only)
          fi

          gcloud run deploy "${{ env.API_SERVICE_NAME }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --image "${FULL_IMAGE}" \
            --port 8000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --allow-unauthenticated \
            --service-account "${RUNTIME_SA}" \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }},RUN_JOB_NAME=${{ env.RUN_JOB_NAME }},MONGODB_DATABASE=${{ env.MONGODB_DATABASE }},REDIS_ENABLED=true,REDIS_PREFIX=sjv,REDIS_DEFAULT_TTL_SECONDS=60,REDIS_SOCKET_TIMEOUT_MS=500,REDIS_CONNECT_TIMEOUT_MS=500" \
            --set-secrets "MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,MIDHTECH_EMAIL=MIDHTECH_EMAIL:latest,MIDHTECH_PASSWORD=MIDHTECH_PASSWORD:latest,REDIS_URL=REDIS_URL:latest" \
            "${EXTRA[@]}"

  deployFrontend:
    runs-on: ubuntu-latest
    needs: [detectChanges, approvalGate]
    if: needs.detectChanges.outputs.frontendChanged == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push frontend image
        id: buildAndPushImage
        shell: bash
        run: |
          set -euo pipefail
          VITE_API_URL="$(gcloud secrets versions access latest \
            --secret="${{ env.VITE_API_URL_SECRET_ID }}" \
            --project="${{ env.GCP_PROJECT_ID }}" | tr -d '\n\r')"
          if [[ -z "$VITE_API_URL" ]]; then
            echo "Secret ${{ env.VITE_API_URL_SECRET_ID }} missing/empty."
            exit 1
          fi
          echo "::add-mask::${VITE_API_URL}"

          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.FRONTEND_IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          FULL_IMAGE="${IMAGE_URI}:${IMAGE_TAG}"
          docker build -f docker/Dockerfile.frontend --build-arg "VITE_API_URL=${VITE_API_URL}" -t "${FULL_IMAGE}" .
          docker push "${FULL_IMAGE}"
          docker tag "${FULL_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"
          echo "fullImage=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend Cloud Run service
        shell: bash
        run: |
          set -euo pipefail
          FULL_IMAGE="${{ steps.buildAndPushImage.outputs.fullImage }}"
          RUNTIME_SA="${{ secrets.GCP_API_RUN_SERVICE_ACCOUNT }}"
          gcloud run deploy "${{ env.UI_SERVICE_NAME }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --image "${FULL_IMAGE}" \
            --port 8080 \
            --cpu 1 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60 \
            --allow-unauthenticated \
            --service-account "${RUNTIME_SA}"

  deployValidation:
    runs-on: ubuntu-latest
    needs: [detectChanges, approvalGate]
    if: needs.detectChanges.outputs.validationChanged == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push validation image
        id: buildAndPushImage
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ env.VALIDATION_IMAGE_NAME }}"
          IMAGE_TAG="${GITHUB_SHA}"
          FULL_IMAGE="${IMAGE_URI}:${IMAGE_TAG}"
          docker build -f docker/Dockerfile.validation -t "${FULL_IMAGE}" .
          docker push "${FULL_IMAGE}"
          docker tag "${FULL_IMAGE}" "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:latest"
          echo "fullImage=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create or update Cloud Run Job
        shell: bash
        run: |
          set -euo pipefail
          FULL_IMAGE="${{ steps.buildAndPushImage.outputs.fullImage }}"
          if gcloud run jobs describe "${{ env.RUN_JOB_NAME }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud run jobs update "${{ env.RUN_JOB_NAME }}" \
              --region "${{ env.GCP_REGION }}" \
              --image "${FULL_IMAGE}" \
              --command python \
              --args validation.py,-1 \
              --task-timeout 3600s \
              --max-retries 1 \
              --set-env-vars "MONGODB_DATABASE=${{ env.MONGODB_DATABASE }}" \
              --set-secrets "MONGODB_URI=MONGODB_URI:latest,MIDHTECH_EMAIL=MIDHTECH_EMAIL:latest,MIDHTECH_PASSWORD=MIDHTECH_PASSWORD:latest"
          else
            gcloud run jobs create "${{ env.RUN_JOB_NAME }}" \
              --region "${{ env.GCP_REGION }}" \
              --image "${FULL_IMAGE}" \
              --command python \
              --args validation.py,-1 \
              --task-timeout 3600s \
              --max-retries 1 \
              --set-env-vars "MONGODB_DATABASE=${{ env.MONGODB_DATABASE }}" \
              --set-secrets "MONGODB_URI=MONGODB_URI:latest,MIDHTECH_EMAIL=MIDHTECH_EMAIL:latest,MIDHTECH_PASSWORD=MIDHTECH_PASSWORD:latest"
          fi

      - name: Ensure Scheduler (00:00 UTC daily)
        shell: bash
        run: |
          set -euo pipefail
          JOB_URI="https://${{ env.GCP_REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.GCP_PROJECT_ID }}/jobs/${{ env.RUN_JOB_NAME }}:run"
          SA_EMAIL="${{ secrets.GCP_SERVICE_ACCOUNT }}"
          if gcloud scheduler jobs describe "${{ env.SCHEDULER_JOB_NAME }}" --location "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${{ env.SCHEDULER_JOB_NAME }}" \
              --location "${{ env.GCP_REGION }}" \
              --schedule "0 0 * * *" \
              --time-zone "Etc/UTC" \
              --uri "${JOB_URI}" \
              --http-method POST \
              --oauth-service-account-email "${SA_EMAIL}"
          else
            gcloud scheduler jobs create http "${{ env.SCHEDULER_JOB_NAME }}" \
              --location "${{ env.GCP_REGION }}" \
              --schedule "0 0 * * *" \
              --time-zone "Etc/UTC" \
              --uri "${JOB_URI}" \
              --http-method POST \
              --oauth-service-account-email "${SA_EMAIL}"
          fi

  ensureGlobalLoadBalancer:
    name: Ensure global HTTPS load balancer
    needs: [detectChanges, approvalGate, deployApi, deployFrontend]
    # Runs only after API/UI deploy jobs complete (parallel deploys both awaited). Skipped if either deploy job failed.
    if: ${{ needs.approvalGate.result == 'success' && (needs.deployApi.result == 'success' || needs.deployApi.result == 'skipped') && (needs.deployFrontend.result == 'success' || needs.deployFrontend.result == 'skipped') && (needs.detectChanges.outputs.apiChanged == 'true' || needs.detectChanges.outputs.frontendChanged == 'true' || (github.event_name == 'workflow_dispatch' && inputs.ensureGlobalLoadBalancer)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable LB-related APIs
        shell: bash
        run: |
          set -euo pipefail
          gcloud services enable compute.googleapis.com certificatemanager.googleapis.com \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Create or update global HTTPS load balancer
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ env.GCP_PROJECT_ID }}"
          REGION="${{ env.GCP_REGION }}"
          UI_DOMAIN="${{ env.UI_DOMAIN }}"
          API_DOMAIN="${{ env.API_DOMAIN }}"

          for service in "${{ env.UI_SERVICE_NAME }}" "${{ env.API_SERVICE_NAME }}"; do
            if ! gcloud run services describe "$service" --project "$PROJECT" --region "$REGION" >/dev/null 2>&1; then
              echo "Cloud Run service missing: $service. Deploy both API and UI first (same workflow run or earlier), then rerun."
              exit 1
            fi
          done

          if ! gcloud compute addresses describe "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute addresses create "${{ env.LB_IP_NAME }}" --global --ip-version IPV4 --project "$PROJECT"
            echo "Created global static IP: ${{ env.LB_IP_NAME }}"
          fi

          if ! gcloud compute ssl-certificates describe "${{ env.LB_CERT_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute ssl-certificates create "${{ env.LB_CERT_NAME }}" \
              --global \
              --domains "${UI_DOMAIN},${API_DOMAIN}" \
              --project "$PROJECT"
            echo "Created managed SSL cert: ${{ env.LB_CERT_NAME }}"
          fi

          if ! gcloud compute network-endpoint-groups describe "${{ env.LB_UI_NEG_NAME }}" --region "$REGION" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute network-endpoint-groups create "${{ env.LB_UI_NEG_NAME }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network-endpoint-type serverless \
              --cloud-run-service "${{ env.UI_SERVICE_NAME }}"
          fi

          if ! gcloud compute network-endpoint-groups describe "${{ env.LB_API_NEG_NAME }}" --region "$REGION" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute network-endpoint-groups create "${{ env.LB_API_NEG_NAME }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network-endpoint-type serverless \
              --cloud-run-service "${{ env.API_SERVICE_NAME }}"
          fi

          if ! gcloud compute backend-services describe "${{ env.LB_UI_BACKEND_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute backend-services create "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED
          fi
          if ! gcloud compute backend-services describe "${{ env.LB_API_BACKEND_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute backend-services create "${{ env.LB_API_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED
          fi

          if ! gcloud compute backend-services describe "${{ env.LB_UI_BACKEND_NAME }}" --global --project "$PROJECT" --format="value(backends.group)" | grep -q "${{ env.LB_UI_NEG_NAME }}"; then
            gcloud compute backend-services add-backend "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --network-endpoint-group "${{ env.LB_UI_NEG_NAME }}" \
              --network-endpoint-group-region "$REGION"
          fi
          if ! gcloud compute backend-services describe "${{ env.LB_API_BACKEND_NAME }}" --global --project "$PROJECT" --format="value(backends.group)" | grep -q "${{ env.LB_API_NEG_NAME }}"; then
            gcloud compute backend-services add-backend "${{ env.LB_API_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --network-endpoint-group "${{ env.LB_API_NEG_NAME }}" \
              --network-endpoint-group-region "$REGION"
          fi

          if gcloud compute url-maps describe "${{ env.LB_URL_MAP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute url-maps set-default-service "${{ env.LB_URL_MAP_NAME }}" \
              --global \
              --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT"
          else
            gcloud compute url-maps create "${{ env.LB_URL_MAP_NAME }}" \
              --global \
              --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT"
          fi

          gcloud compute url-maps add-path-matcher "${{ env.LB_URL_MAP_NAME }}" \
            --global \
            --project "$PROJECT" \
            --path-matcher-name sjv-hosts \
            --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
            --new-hosts "${UI_DOMAIN}" \
            --quiet || true

          gcloud compute url-maps add-path-matcher "${{ env.LB_URL_MAP_NAME }}" \
            --global \
            --project "$PROJECT" \
            --path-matcher-name sjv-api-host \
            --default-service "${{ env.LB_API_BACKEND_NAME }}" \
            --new-hosts "${API_DOMAIN}" \
            --quiet || true

          if ! gcloud compute target-https-proxies describe "${{ env.LB_HTTPS_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute target-https-proxies create "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}" \
              --ssl-certificates "${{ env.LB_CERT_NAME }}"
          else
            gcloud compute target-https-proxies update "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}" \
              --ssl-certificates "${{ env.LB_CERT_NAME }}"
          fi

          if ! gcloud compute target-http-proxies describe "${{ env.LB_HTTP_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute target-http-proxies create "${{ env.LB_HTTP_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}"
          else
            gcloud compute target-http-proxies update "${{ env.LB_HTTP_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}"
          fi

          if ! gcloud compute forwarding-rules describe "${{ env.LB_HTTPS_FWD_RULE_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute forwarding-rules create "${{ env.LB_HTTPS_FWD_RULE_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED \
              --network-tier PREMIUM \
              --address "${{ env.LB_IP_NAME }}" \
              --target-https-proxy "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --ports 443
          fi

          if ! gcloud compute forwarding-rules describe "${{ env.LB_HTTP_FWD_RULE_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute forwarding-rules create "${{ env.LB_HTTP_FWD_RULE_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED \
              --network-tier PREMIUM \
              --address "${{ env.LB_IP_NAME }}" \
              --target-http-proxy "${{ env.LB_HTTP_PROXY_NAME }}" \
              --ports 80
          fi

          LB_IP="$(gcloud compute addresses describe "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" --format='value(address)')"
          echo "Load balancer ensured after Cloud Run deploy. Point DNS A records for UI/API hosts to: ${LB_IP}"
