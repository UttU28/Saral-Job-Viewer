name: Ensure Prerequisites (infra/bootstrap)

on:
  workflow_dispatch:
    inputs:
      confirmText:
        description: Type ENSURE_SARAL_STACK to continue
        required: true
        type: string
      ensureRedisInfra:
        description: Ensure Memorystore + VPC connector exist
        required: true
        default: true
        type: boolean
      ensureDomainMappings:
        description: Try to ensure custom domain mappings (requires verified domains)
        required: true
        default: false
        type: boolean
      ensureLoadBalancer:
        description: Ensure global HTTPS load balancer with host routing for UI/API domains
        required: true
        default: true
        type: boolean

env:
  GCP_PROJECT_ID: saraljobviewer
  GCP_REGION: us-east1
  AR_REPOSITORY: saral-job-viewer-cr

  API_SERVICE_NAME: saral-api
  UI_SERVICE_NAME: saral-ui
  RUN_JOB_NAME: saral-dvalidate-job
  SCHEDULER_JOB_NAME: saral-dvalidate-midnight-utc

  API_IMAGE_NAME: api
  UI_IMAGE_NAME: frontend
  VALIDATION_IMAGE_NAME: dvalidate

  MONGODB_DATABASE: saralJobViewer
  REDIS_INSTANCE_ID: saral-memorystore-redis
  VPC_CONNECTOR_NAME: sjv-run-vpc
  VPC_NETWORK: default
  VPC_CONNECTOR_CIDR: 10.8.0.0/28

  UI_DOMAIN: saral.thatinsaneguy.com
  API_DOMAIN: saralapi.thatinsaneguy.com
  LB_IP_NAME: sjv-global-lb-ip
  LB_CERT_NAME: sjv-managed-cert
  LB_UI_NEG_NAME: sjv-ui-neg
  LB_API_NEG_NAME: sjv-api-neg
  LB_UI_BACKEND_NAME: sjv-ui-bes
  LB_API_BACKEND_NAME: sjv-api-bes
  LB_URL_MAP_NAME: sjv-host-routing
  LB_HTTPS_PROXY_NAME: sjv-https-proxy
  LB_HTTP_PROXY_NAME: sjv-http-proxy
  LB_HTTPS_FWD_RULE_NAME: sjv-https-fr
  LB_HTTP_FWD_RULE_NAME: sjv-http-fr

jobs:
  ensureStack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Confirm action
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirmText }}" != "ENSURE_SARAL_STACK" ]]; then
            echo "Confirmation text mismatch. Type exactly: ENSURE_SARAL_STACK"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        shell: bash
        run: |
          set -euo pipefail
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            cloudscheduler.googleapis.com \
            iamcredentials.googleapis.com \
            redis.googleapis.com \
            vpcaccess.googleapis.com \
            compute.googleapis.com \
            certificatemanager.googleapis.com \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Check required secrets exist
        shell: bash
        run: |
          set -euo pipefail
          REQUIRED_SECRETS=(
            MONGODB_URI
            JWT_SECRET
            MIDHTECH_EMAIL
            MIDHTECH_PASSWORD
            REDIS_URL
            VITE_API_URL
          )
          MISSING=()
          for S in "${REQUIRED_SECRETS[@]}"; do
            if ! gcloud secrets describe "$S" --project "${{ env.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              MISSING+=("$S")
            fi
          done
          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "Missing required secrets: ${MISSING[*]}"
            echo "Create them in Secret Manager first, then rerun."
            exit 1
          fi
          echo "All required secrets exist."

      - name: Ensure Artifact Registry images exist
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}"
          IMAGES=("${{ env.API_IMAGE_NAME }}" "${{ env.UI_IMAGE_NAME }}" "${{ env.VALIDATION_IMAGE_NAME }}")
          for IMG in "${IMAGES[@]}"; do
            if gcloud artifacts docker images describe "${BASE}/${IMG}:latest" --project "${{ env.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              echo "Image exists: ${BASE}/${IMG}:latest"
            else
              echo "Missing image: ${BASE}/${IMG}:latest"
              echo "Build/push first using deploy workflows, then rerun."
              exit 1
            fi
          done

      - name: Ensure Redis infra (optional)
        if: inputs.ensureRedisInfra
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ env.GCP_PROJECT_ID }}"
          REGION="${{ env.GCP_REGION }}"

          if gcloud compute networks vpc-access connectors describe "${{ env.VPC_CONNECTOR_NAME }}" --project "$PROJECT" --region "$REGION" >/dev/null 2>&1; then
            echo "VPC connector exists: ${{ env.VPC_CONNECTOR_NAME }}"
          else
            gcloud compute networks vpc-access connectors create "${{ env.VPC_CONNECTOR_NAME }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network "${{ env.VPC_NETWORK }}" \
              --range "${{ env.VPC_CONNECTOR_CIDR }}" \
              --min-instances 2 \
              --max-instances 3
            echo "Created VPC connector: ${{ env.VPC_CONNECTOR_NAME }}"
          fi

          if gcloud redis instances describe "${{ env.REDIS_INSTANCE_ID }}" --project "$PROJECT" --region "$REGION" >/dev/null 2>&1; then
            echo "Redis instance exists: ${{ env.REDIS_INSTANCE_ID }}"
          else
            gcloud redis instances create "${{ env.REDIS_INSTANCE_ID }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network "projects/${PROJECT}/global/networks/${{ env.VPC_NETWORK }}" \
              --tier "BASIC" \
              --size "1" \
              --redis-version "redis_7_0" \
              --connect-mode "DIRECT_PEERING"
            echo "Created Redis instance: ${{ env.REDIS_INSTANCE_ID }}"
          fi

      - name: Ensure gcloud beta commands are installed
        if: inputs.ensureDomainMappings
        shell: bash
        run: |
          set -euo pipefail
          gcloud components install beta --quiet

      - name: Ensure domain mappings (optional)
        if: inputs.ensureDomainMappings
        shell: bash
        run: |
          set -euo pipefail
          for service in "${{ env.UI_SERVICE_NAME }}" "${{ env.API_SERVICE_NAME }}"; do
            if ! gcloud run services describe "$service" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
              echo "Cloud Run service missing: $service. Deploy via deployOnMainApproved first, then rerun with ensureDomainMappings=true."
              exit 1
            fi
          done

          ensure_mapping() {
            local domain="$1"
            local service="$2"
            if gcloud beta run domain-mappings describe --domain "$domain" --project "${{ env.GCP_PROJECT_ID }}" --region "${{ env.GCP_REGION }}" >/dev/null 2>&1; then
              echo "Domain mapping exists: $domain -> $service"
            else
              gcloud beta run domain-mappings create \
                --domain "$domain" \
                --service "$service" \
                --project "${{ env.GCP_PROJECT_ID }}" \
                --region "${{ env.GCP_REGION }}"
              echo "Created domain mapping: $domain -> $service"
            fi
          }
          ensure_mapping "${{ env.UI_DOMAIN }}" "${{ env.UI_SERVICE_NAME }}"
          ensure_mapping "${{ env.API_DOMAIN }}" "${{ env.API_SERVICE_NAME }}"

      - name: Ensure global HTTPS Load Balancer (optional)
        if: inputs.ensureLoadBalancer
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ env.GCP_PROJECT_ID }}"
          REGION="${{ env.GCP_REGION }}"
          UI_DOMAIN="${{ env.UI_DOMAIN }}"
          API_DOMAIN="${{ env.API_DOMAIN }}"

          for service in "${{ env.UI_SERVICE_NAME }}" "${{ env.API_SERVICE_NAME }}"; do
            if ! gcloud run services describe "$service" --project "$PROJECT" --region "$REGION" >/dev/null 2>&1; then
              echo "Cloud Run service missing: $service. Deploy with deployment.yml first, then rerun ensureLoadBalancer=true."
              exit 1
            fi
          done

          if ! gcloud compute addresses describe "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute addresses create "${{ env.LB_IP_NAME }}" --global --ip-version IPV4 --project "$PROJECT"
            echo "Created global static IP: ${{ env.LB_IP_NAME }}"
          fi

          if ! gcloud compute ssl-certificates describe "${{ env.LB_CERT_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute ssl-certificates create "${{ env.LB_CERT_NAME }}" \
              --global \
              --domains "${UI_DOMAIN},${API_DOMAIN}" \
              --project "$PROJECT"
            echo "Created managed SSL cert: ${{ env.LB_CERT_NAME }}"
          fi

          if ! gcloud compute network-endpoint-groups describe "${{ env.LB_UI_NEG_NAME }}" --region "$REGION" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute network-endpoint-groups create "${{ env.LB_UI_NEG_NAME }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network-endpoint-type serverless \
              --cloud-run-service "${{ env.UI_SERVICE_NAME }}"
          fi

          if ! gcloud compute network-endpoint-groups describe "${{ env.LB_API_NEG_NAME }}" --region "$REGION" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute network-endpoint-groups create "${{ env.LB_API_NEG_NAME }}" \
              --project "$PROJECT" \
              --region "$REGION" \
              --network-endpoint-type serverless \
              --cloud-run-service "${{ env.API_SERVICE_NAME }}"
          fi

          if ! gcloud compute backend-services describe "${{ env.LB_UI_BACKEND_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute backend-services create "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED
          fi
          if ! gcloud compute backend-services describe "${{ env.LB_API_BACKEND_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute backend-services create "${{ env.LB_API_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED
          fi

          if ! gcloud compute backend-services describe "${{ env.LB_UI_BACKEND_NAME }}" --global --project "$PROJECT" --format="value(backends.group)" | grep -q "${{ env.LB_UI_NEG_NAME }}"; then
            gcloud compute backend-services add-backend "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --network-endpoint-group "${{ env.LB_UI_NEG_NAME }}" \
              --network-endpoint-group-region "$REGION"
          fi
          if ! gcloud compute backend-services describe "${{ env.LB_API_BACKEND_NAME }}" --global --project "$PROJECT" --format="value(backends.group)" | grep -q "${{ env.LB_API_NEG_NAME }}"; then
            gcloud compute backend-services add-backend "${{ env.LB_API_BACKEND_NAME }}" \
              --project "$PROJECT" \
              --global \
              --network-endpoint-group "${{ env.LB_API_NEG_NAME }}" \
              --network-endpoint-group-region "$REGION"
          fi

          if gcloud compute url-maps describe "${{ env.LB_URL_MAP_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute url-maps set-default-service "${{ env.LB_URL_MAP_NAME }}" \
              --global \
              --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT"
          else
            gcloud compute url-maps create "${{ env.LB_URL_MAP_NAME }}" \
              --global \
              --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
              --project "$PROJECT"
          fi

          gcloud compute url-maps add-path-matcher "${{ env.LB_URL_MAP_NAME }}" \
            --global \
            --project "$PROJECT" \
            --path-matcher-name sjv-hosts \
            --default-service "${{ env.LB_UI_BACKEND_NAME }}" \
            --new-hosts "${UI_DOMAIN}" \
            --quiet || true

          gcloud compute url-maps add-path-matcher "${{ env.LB_URL_MAP_NAME }}" \
            --global \
            --project "$PROJECT" \
            --path-matcher-name sjv-api-host \
            --default-service "${{ env.LB_API_BACKEND_NAME }}" \
            --new-hosts "${API_DOMAIN}" \
            --quiet || true

          if ! gcloud compute target-https-proxies describe "${{ env.LB_HTTPS_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute target-https-proxies create "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}" \
              --ssl-certificates "${{ env.LB_CERT_NAME }}"
          else
            gcloud compute target-https-proxies update "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}" \
              --ssl-certificates "${{ env.LB_CERT_NAME }}"
          fi

          if ! gcloud compute target-http-proxies describe "${{ env.LB_HTTP_PROXY_NAME }}" --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute target-http-proxies create "${{ env.LB_HTTP_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}"
          else
            gcloud compute target-http-proxies update "${{ env.LB_HTTP_PROXY_NAME }}" \
              --project "$PROJECT" \
              --url-map "${{ env.LB_URL_MAP_NAME }}"
          fi

          if ! gcloud compute forwarding-rules describe "${{ env.LB_HTTPS_FWD_RULE_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute forwarding-rules create "${{ env.LB_HTTPS_FWD_RULE_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED \
              --network-tier PREMIUM \
              --address "${{ env.LB_IP_NAME }}" \
              --target-https-proxy "${{ env.LB_HTTPS_PROXY_NAME }}" \
              --ports 443
          fi

          if ! gcloud compute forwarding-rules describe "${{ env.LB_HTTP_FWD_RULE_NAME }}" --global --project "$PROJECT" >/dev/null 2>&1; then
            gcloud compute forwarding-rules create "${{ env.LB_HTTP_FWD_RULE_NAME }}" \
              --project "$PROJECT" \
              --global \
              --load-balancing-scheme EXTERNAL_MANAGED \
              --network-tier PREMIUM \
              --address "${{ env.LB_IP_NAME }}" \
              --target-http-proxy "${{ env.LB_HTTP_PROXY_NAME }}" \
              --ports 80
          fi

          LB_IP="$(gcloud compute addresses describe "${{ env.LB_IP_NAME }}" --global --project "$PROJECT" --format='value(address)')"
          echo "Load balancer is ensured. Point both DNS A records to: ${LB_IP}"

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          echo "Prereq ensure completed."
          echo "What this workflow handles: APIs enabled, required secrets verified, required images checked, optional Redis/VPC infra, optional domain mappings, optional global HTTPS load balancer."
          echo "Deploy app/runtime resources via deployOnMainApproved."

