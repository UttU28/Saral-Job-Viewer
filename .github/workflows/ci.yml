# Tests, dependency audits, Docker image builds + Trivy CVE scans. Reused by Main Deploy via workflow_call.
# Reports: job summaries below + Security tab (Trivy SARIF). CodeQL runs in codeql.yml (SAST).
name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  backendFrontend:
    name: Tests & audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Pip dependency audit (requirements.txt)
        run: pip-audit -r requirements.txt

      - name: Pytest
        run: pytest -q --tb=short

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high severity or higher)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run check

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Job summary — tests & audits
        if: always()
        env:
          JOB_CONCLUSION: ${{ job.conclusion }}
        run: |
          echo "## Tests and dependency audits" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**This job:** ${JOB_CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${JOB_CONCLUSION}" = "success" ]; then
            echo "| Step | Purpose |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| pip-audit | CVEs in requirements.txt |" >> "$GITHUB_STEP_SUMMARY"
            echo "| pytest | Python unit tests + API smoke tests |" >> "$GITHUB_STEP_SUMMARY"
            echo "| npm audit | npm dependencies (high+) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| tsc / vitest / vite build | Frontend checks |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All steps above completed without error." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "One or more steps failed — scroll up to the first failing step." >> "$GITHUB_STEP_SUMMARY"
          fi

  scanContainers:
    name: Trivy (${{ matrix.name }} image)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile.api
            tag: saral-api:ci
          - name: frontend
            dockerfile: docker/Dockerfile.frontend
            tag: saral-ui:ci
          - name: validation
            dockerfile: docker/Dockerfile.validation
            tag: saral-dvalidate:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          set -euo pipefail
          if [[ "${{ matrix.name }}" == "frontend" ]]; then
            docker build -f "${{ matrix.dockerfile }}" --build-arg VITE_API_URL=https://example.com -t "${{ matrix.tag }}" .
          else
            docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.tag }}" .
          fi

      - name: Trivy — SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-container-${{ matrix.name }}

      - name: Trivy — gate & table report (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "1"

      - name: Job summary — container scan
        if: always()
        env:
          JOB_CONCLUSION: ${{ job.conclusion }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TAG: ${{ matrix.tag }}
          MATRIX_FILE: ${{ matrix.dockerfile }}
        run: |
          echo "### Trivy (${MATRIX_NAME} image)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**This matrix leg:** ${JOB_CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${MATRIX_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dockerfile: ${MATRIX_FILE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SARIF category: trivy-container-${MATRIX_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${JOB_CONCLUSION}" = "success" ]; then
            echo "Trivy gate passed (no HIGH/CRITICAL findings for this image)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Trivy gate failed — see the step **Trivy — gate and table report** above." >> "$GITHUB_STEP_SUMMARY"
          fi

  ciSummary:
    name: CI report
    runs-on: ubuntu-latest
    needs: [backendFrontend, scanContainers]
    if: always()
    steps:
      - name: Pipeline summary
        env:
          TESTS: ${{ needs.backendFrontend.result }}
          IMAGES: ${{ needs.scanContainers.result }}
        run: |
          echo "## Full CI report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests & audits | ${TESTS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy (3 Dockerfiles) | ${IMAGES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Where to find security output" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CodeQL:** repo **Security** → **Code scanning** (runs in the separate CodeQL workflow)." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trivy:** same tab; look for SARIF categories trivy-container-api, trivy-container-frontend, trivy-container-validation." >> "$GITHUB_STEP_SUMMARY"
          echo "- **pip-audit / npm audit:** logs in the **Tests & audits** job." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Overall status" >> "$GITHUB_STEP_SUMMARY"
          if [ "${TESTS}" = "success" ] && [ "${IMAGES}" = "success" ]; then
            echo "**All CI stages passed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "**One or more stages failed.** Fix the failing jobs above before merging or deploying." >> "$GITHUB_STEP_SUMMARY"
          exit 1
