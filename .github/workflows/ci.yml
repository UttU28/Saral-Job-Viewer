name: CI

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  backendFrontend:
    name: Tests & audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Pip dependency audit (requirements.txt)
        run: pip-audit -r requirements.txt

      - name: Pytest
        run: pytest -q --tb=short

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high severity or higher)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run check

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Job summary — tests & audits
        if: always()
        env:
          JOB_CONCLUSION: ${{ job.conclusion }}
        run: |
          echo "## Tests and dependency audits" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**This job:** ${JOB_CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${JOB_CONCLUSION}" = "success" ]; then
            echo "| Step | Purpose |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| pip-audit | CVEs in requirements.txt |" >> "$GITHUB_STEP_SUMMARY"
            echo "| pytest | Python unit tests + API smoke tests |" >> "$GITHUB_STEP_SUMMARY"
            echo "| npm audit | npm dependencies (high+) |" >> "$GITHUB_STEP_SUMMARY"
            echo "| tsc / vitest / vite build | Frontend checks |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All steps above completed without error." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "One or more steps failed — scroll up to the first failing step." >> "$GITHUB_STEP_SUMMARY"
          fi

  scanContainers:
    name: Trivy (${{ matrix.name }} image)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile.api
            tag: saral-api:ci
          - name: frontend
            dockerfile: docker/Dockerfile.frontend
            tag: saral-ui:ci
          - name: validation
            dockerfile: docker/Dockerfile.validation
            tag: saral-dvalidate:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          set -euo pipefail
          if [[ "${{ matrix.name }}" == "frontend" ]]; then
            docker build -f "${{ matrix.dockerfile }}" --build-arg VITE_API_URL=https://example.com -t "${{ matrix.tag }}" .
          else
            docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.tag }}" .
          fi

      - name: Trivy — SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-container-${{ matrix.name }}

      - name: Trivy — table report (informational, does not fail CI)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.tag }}
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "0"

      - name: Count HIGH/CRITICAL for summary
        id: trivyCounts
        continue-on-error: true
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TAG: ${{ matrix.tag }}
          IMAGE_REF: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          export PATH="${HOME}/.local/bin/trivy-bin:${PATH}"
          export OUT="/tmp/trivy-count-${MATRIX_NAME}.json"
          trivy image --severity HIGH,CRITICAL --format json --exit-code 0 \
            --scanners vuln "${IMAGE_REF}" > "${OUT}"
          python3 << 'PY'
          import json, os
          path = os.environ["OUT"]
          name = os.environ["MATRIX_NAME"]
          tag = os.environ["MATRIX_TAG"]
          with open(path, encoding="utf-8") as f:
              data = json.load(f)
          n_high = n_crit = 0
          for r in data.get("Results") or []:
              for v in r.get("Vulnerabilities") or []:
                  sev = (v.get("Severity") or "").upper()
                  if sev == "CRITICAL":
                      n_crit += 1
                  elif sev == "HIGH":
                      n_high += 1
          total = n_high + n_crit
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          lines = [
              f"### Trivy ({name} image)",
              "",
              f"- **Image:** `{tag}`",
              f"- **HIGH / CRITICAL (informational):** {total} total — HIGH: {n_high}, CRITICAL: {n_crit}",
              "",
              "These counts **do not fail CI**. Review the **Trivy table report** step above and **Security → Code scanning**.",
              "",
              f"SARIF category: `trivy-container-{name}`",
          ]
          with open(summary_path, "a", encoding="utf-8") as h:
              h.write("\n".join(lines) + "\n")
          print(f"trivy_counts name={name} high={n_high} critical={n_crit} total={total}", flush=True)
          gh_out = os.environ["GITHUB_OUTPUT"]
          with open(gh_out, "a", encoding="utf-8") as out:
              out.write(f"high={n_high}\n")
              out.write(f"critical={n_crit}\n")
              out.write(f"total={total}\n")
          PY

  ciSummary:
    name: CI report
    runs-on: ubuntu-latest
    needs: [backendFrontend, scanContainers]
    if: always()
    steps:
      - name: Pipeline summary
        env:
          TESTS: ${{ needs.backendFrontend.result }}
          IMAGES: ${{ needs.scanContainers.result }}
        run: |
          echo "## Full CI report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests & audits | ${TESTS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy (3 Dockerfiles) | ${IMAGES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Where to find security output" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CodeQL:** repo **Security** → **Code scanning** (same **Main Deploy** run as this CI; weekly-only scans still use **Actions → CodeQL**)." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trivy:** informational only (PR stays green). Counts per image are in each **Trivy** matrix job Summary; SARIF categories trivy-container-api, trivy-container-frontend, trivy-container-validation." >> "$GITHUB_STEP_SUMMARY"
          echo "- **pip-audit / npm audit:** logs in the **Tests & audits** job." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Overall status" >> "$GITHUB_STEP_SUMMARY"
          if [ "${TESTS}" = "success" ] && [ "${IMAGES}" = "success" ]; then
            echo "**All CI stages passed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "**One or more stages failed.** Fix the failing jobs above before merging or deploying." >> "$GITHUB_STEP_SUMMARY"
          exit 1
