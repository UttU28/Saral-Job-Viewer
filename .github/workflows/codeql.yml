# Static analysis (SAST) — source code, not container layers. Results: Security → Code scanning alerts.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyzePython:
    name: CodeQL — Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config-python.yml
          build-mode: none

      - name: Perform CodeQL analysis
        id: codeqlAnalyzePython
        uses: github/codeql-action/analyze@v3

      - name: Analysis summary (Python)
        if: always()
        env:
          ANALYZE_CONCLUSION: ${{ steps.codeqlAnalyzePython.conclusion }}
        run: |
          echo "## CodeQL (Python)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Analyze step:** ${ANALYZE_CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${ANALYZE_CONCLUSION}" = "success" ]; then
            echo "Analysis finished successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "Open **Security** → **Code scanning** to review alerts (if any)." >> "$GITHUB_STEP_SUMMARY"
            echo "Scope is controlled by \`.github/codeql/codeql-config-python.yml\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "The step **Perform CodeQL analysis** did not succeed — expand it for error logs." >> "$GITHUB_STEP_SUMMARY"
          fi

  analyzeJs:
    name: CodeQL — JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config-js.yml

      - name: Install and build frontend (required for JS/TS extraction)
        working-directory: frontend
        run: npm ci && npm run build

      - name: Perform CodeQL analysis
        id: codeqlAnalyzeJs
        uses: github/codeql-action/analyze@v3

      - name: Analysis summary (JavaScript/TypeScript)
        if: always()
        env:
          ANALYZE_CONCLUSION: ${{ steps.codeqlAnalyzeJs.conclusion }}
        run: |
          echo "## CodeQL (JavaScript / TypeScript)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Analyze step:** ${ANALYZE_CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${ANALYZE_CONCLUSION}" = "success" ]; then
            echo "Analysis finished successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "Open **Security** → **Code scanning** to review alerts (if any)." >> "$GITHUB_STEP_SUMMARY"
            echo "Scanned \`frontend/src\` after \`npm ci\` and \`npm run build\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "The step **Perform CodeQL analysis** did not succeed — expand it for error logs." >> "$GITHUB_STEP_SUMMARY"
          fi
