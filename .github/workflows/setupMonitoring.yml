# Observability: APIs, uptime checks, dashboard, alerts — idempotent. All definitions live in this workflow (no infra/ folder).
# Secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT (same as deploy), MONITORING_ALERT_EMAIL unless skipNotificationChannelAndAlerts is true.
# IAM: docs/MONITORING-WINDOWS-GCLOUD.md — "GitHub Actions workflow IAM".

name: Setup GCP monitoring & alerting

on:
  workflow_dispatch:
    inputs:
      skipNotificationChannelAndAlerts:
        description: If true, only APIs + uptime checks + dashboard (no email channel / alert policies).
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: saraljobviewer
  GCP_REGION: us-east1
  UI_DOMAIN: saral.thatinsaneguy.com
  API_DOMAIN: saralapi.thatinsaneguy.com

jobs:
  setupMonitoring:
    name: Ensure Monitoring resources
    runs-on: ubuntu-latest
    steps:
      - id: authGoogleCloud
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - id: setupGcloudCli
        name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: beta

      - id: ensureMonitoringStack
        name: Ensure APIs, uptime, dashboard, alerts (idempotent)
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          UI_DOMAIN: ${{ env.UI_DOMAIN }}
          API_DOMAIN: ${{ env.API_DOMAIN }}
          MONITORING_ALERT_EMAIL: ${{ secrets.MONITORING_ALERT_EMAIL }}
          SKIP_ALERTS: ${{ inputs.skipNotificationChannelAndAlerts }}
        run: |
          set -euo pipefail
          PROJECT="${GCP_PROJECT_ID}"
          UI_HOST="${UI_DOMAIN}"
          API_HOST="${API_DOMAIN}"
          CHANNEL_TITLE="Saral Job Viewer alerts"
          DASH_TITLE="Saral Job Viewer - Overview"
          SKIP_ALERTS_LC="$(printf '%s' "${SKIP_ALERTS:-false}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${SKIP_ALERTS_LC}" != "true" ]] && [[ -z "${MONITORING_ALERT_EMAIL:-}" ]]; then
            echo "::error::Set repository secret MONITORING_ALERT_EMAIL or re-run with skipNotificationChannelAndAlerts=true."
            exit 1
          fi

          echo "Project=${PROJECT} UI=${UI_HOST} API=${API_HOST}"
          gcloud config set project "${PROJECT}" --quiet

          echo "[1/5] Enabling observability APIs..."
          gcloud services enable \
            monitoring.googleapis.com \
            logging.googleapis.com \
            cloudtrace.googleapis.com \
            clouderrorreporting.googleapis.com \
            --project "${PROJECT}" --quiet

          uptime_exists() {
            local name="$1"
            local raw n
            raw="$(gcloud monitoring uptime list-configs --project="${PROJECT}" --format=json)"
            n="$(echo "${raw}" | jq --arg n "$name" '
              (if type == "array" then . elif .uptimeCheckConfigs then .uptimeCheckConfigs else [] end)
              | [.[]? | select(.displayName == $n)]
              | length
            ')"
            [[ "${n}" -gt 0 ]]
          }

          ensure_uptime() {
            local title="$1" host="$2" path="$3"
            if uptime_exists "${title}"; then
              echo "Uptime check exists: ${title}"
              return 0
            fi
            echo "Creating uptime check: ${title}"
            gcloud monitoring uptime create "${title}" \
              --project="${PROJECT}" \
              --resource-type=uptime-url \
              --resource-labels="host=${host},project_id=${PROJECT}" \
              --protocol=https \
              --path="${path}" \
              --validate-ssl=true \
              --regions=usa-virginia,usa-oregon,usa-iowa \
              --period=1 \
              --quiet
          }

          echo "[2/5] Uptime checks..."
          ensure_uptime "Saral UI LB health (HTTPS /)" "${UI_HOST}" "/"
          ensure_uptime "Saral API LB health (HTTPS /api/health)" "${API_HOST}" "/api/health"

          echo "[3/5] Dashboard JSON..."
          cat <<'DASHBOARD_EOF' >/tmp/saralDashboardOverview.json
          {
            "displayName": "Saral Job Viewer - Overview",
            "mosaicLayout": {
              "columns": 12,
              "tiles": [
                {
                  "xPos": 0,
                  "yPos": 0,
                  "width": 12,
                  "height": 2,
                  "widget": {
                    "title": "README",
                    "text": {
                      "content": "**Saral** production metrics (Cloud Run + LB + Redis). Managed by `.github/workflows/setupMonitoring.yml`.",
                      "format": "MARKDOWN"
                    }
                  }
                },
                {
                  "xPos": 0,
                  "yPos": 2,
                  "width": 6,
                  "height": 4,
                  "widget": {
                    "title": "saral-api - request rate",
                    "xyChart": {
                      "dataSets": [
                        {
                          "timeSeriesQuery": {
                            "timeSeriesFilter": {
                              "filter": "metric.type=\"run.googleapis.com/request_count\" resource.type=\"cloud_run_revision\" resource.labels.service_name=\"saral-api\"",
                              "aggregation": {
                                "alignmentPeriod": "60s",
                                "perSeriesAligner": "ALIGN_RATE",
                                "crossSeriesReducer": "REDUCE_SUM",
                                "groupByFields": []
                              }
                            }
                          },
                          "plotType": "LINE"
                        }
                      ],
                      "timeshiftDuration": "0s",
                      "yAxis": { "label": "req/s", "scale": "LINEAR" },
                      "chartOptions": { "mode": "COLOR" }
                    }
                  }
                },
                {
                  "xPos": 6,
                  "yPos": 2,
                  "width": 6,
                  "height": 4,
                  "widget": {
                    "title": "saral-ui - request rate",
                    "xyChart": {
                      "dataSets": [
                        {
                          "timeSeriesQuery": {
                            "timeSeriesFilter": {
                              "filter": "metric.type=\"run.googleapis.com/request_count\" resource.type=\"cloud_run_revision\" resource.labels.service_name=\"saral-ui\"",
                              "aggregation": {
                                "alignmentPeriod": "60s",
                                "perSeriesAligner": "ALIGN_RATE",
                                "crossSeriesReducer": "REDUCE_SUM",
                                "groupByFields": []
                              }
                            }
                          },
                          "plotType": "LINE"
                        }
                      ],
                      "timeshiftDuration": "0s",
                      "yAxis": { "label": "req/s", "scale": "LINEAR" },
                      "chartOptions": { "mode": "COLOR" }
                    }
                  }
                },
                {
                  "xPos": 0,
                  "yPos": 6,
                  "width": 6,
                  "height": 4,
                  "widget": {
                    "title": "HTTPS LB - sjv-api-bes request rate",
                    "xyChart": {
                      "dataSets": [
                        {
                          "timeSeriesQuery": {
                            "timeSeriesFilter": {
                              "filter": "metric.type=\"loadbalancing.googleapis.com/https/request_count\" resource.type=\"https_lb_rule\" resource.labels.backend_service_name=\"sjv-api-bes\"",
                              "aggregation": {
                                "alignmentPeriod": "60s",
                                "perSeriesAligner": "ALIGN_RATE",
                                "crossSeriesReducer": "REDUCE_SUM",
                                "groupByFields": []
                              }
                            }
                          },
                          "plotType": "LINE"
                        }
                      ],
                      "timeshiftDuration": "0s",
                      "yAxis": { "label": "req/s", "scale": "LINEAR" },
                      "chartOptions": { "mode": "COLOR" }
                    }
                  }
                },
                {
                  "xPos": 6,
                  "yPos": 6,
                  "width": 6,
                  "height": 4,
                  "widget": {
                    "title": "HTTPS LB - sjv-ui-bes request rate",
                    "xyChart": {
                      "dataSets": [
                        {
                          "timeSeriesQuery": {
                            "timeSeriesFilter": {
                              "filter": "metric.type=\"loadbalancing.googleapis.com/https/request_count\" resource.type=\"https_lb_rule\" resource.labels.backend_service_name=\"sjv-ui-bes\"",
                              "aggregation": {
                                "alignmentPeriod": "60s",
                                "perSeriesAligner": "ALIGN_RATE",
                                "crossSeriesReducer": "REDUCE_SUM",
                                "groupByFields": []
                              }
                            }
                          },
                          "plotType": "LINE"
                        }
                      ],
                      "timeshiftDuration": "0s",
                      "yAxis": { "label": "req/s", "scale": "LINEAR" },
                      "chartOptions": { "mode": "COLOR" }
                    }
                  }
                },
                {
                  "xPos": 0,
                  "yPos": 10,
                  "width": 12,
                  "height": 4,
                  "widget": {
                    "title": "Memorystore Redis - memory usage ratio (saral-memorystore-redis)",
                    "xyChart": {
                      "dataSets": [
                        {
                          "timeSeriesQuery": {
                            "timeSeriesFilter": {
                              "filter": "metric.type=\"redis.googleapis.com/stats/memory/usage_ratio\" resource.type=\"redis_instance\" resource.labels.instance_id=\"saral-memorystore-redis\" resource.labels.region=\"us-east1\"",
                              "aggregation": {
                                "alignmentPeriod": "60s",
                                "perSeriesAligner": "ALIGN_MEAN",
                                "crossSeriesReducer": "REDUCE_MEAN",
                                "groupByFields": []
                              }
                            }
                          },
                          "plotType": "LINE"
                        }
                      ],
                      "timeshiftDuration": "0s",
                      "yAxis": { "label": "ratio", "scale": "LINEAR" },
                      "chartOptions": { "mode": "COLOR" }
                    }
                  }
                }
              ]
            }
          }
          DASHBOARD_EOF

          echo "[4/5] Dashboard resource..."
          dash_count="$(gcloud monitoring dashboards list --project="${PROJECT}" --format=json | jq --arg t "${DASH_TITLE}" '[.[]? | select(.displayName == $t)] | length')"
          if [[ "${dash_count}" -gt 0 ]]; then
            echo "Dashboard exists: ${DASH_TITLE}"
          else
            gcloud monitoring dashboards create --project="${PROJECT}" --config-from-file=/tmp/saralDashboardOverview.json --quiet
          fi

          CHANNEL_NAME=""
          if [[ "${SKIP_ALERTS_LC}" == "true" ]]; then
            echo "[5/5] Skipping notification channel and alert policies."
          else
            echo "[5/5] Notification channel + alert policies..."
            CHANNEL_NAME="$(gcloud beta monitoring channels list --project="${PROJECT}" --format=json | jq -r --arg t "${CHANNEL_TITLE}" '[.[]? | select(.displayName == $t) | .name] | first // empty')"
            if [[ -z "${CHANNEL_NAME}" ]]; then
              gcloud beta monitoring channels create \
                --project="${PROJECT}" \
                --display-name="${CHANNEL_TITLE}" \
                --type=email \
                --channel-labels="email_address=${MONITORING_ALERT_EMAIL}" \
                --quiet
              CHANNEL_NAME="$(gcloud beta monitoring channels list --project="${PROJECT}" --format=json | jq -r --arg t "${CHANNEL_TITLE}" '[.[]? | select(.displayName == $t) | .name] | first // empty')"
            else
              echo "Notification channel exists: ${CHANNEL_TITLE}"
            fi

            POLICY_DIR=/tmp/saralMonitoringPolicies
            mkdir -p "${POLICY_DIR}"

            cat <<'YAML_EOF' >"${POLICY_DIR}/uptimeUi.yaml"
          displayName: "Saral UI - uptime URL failing"
          combiner: OR
          conditions:
            - displayName: Uptime check_passed below 1
              conditionThreshold:
                filter: |
                  metric.type="monitoring.googleapis.com/uptime_check/check_passed"
                  resource.type="uptime_url"
                  resource.labels.project_id="saraljobviewer"
                  resource.labels.host="saral.thatinsaneguy.com"
                comparison: COMPARISON_LT
                thresholdValue: 1
                duration: 300s
                aggregations:
                  - alignmentPeriod: 300s
                    perSeriesAligner: ALIGN_NEXT_OLDER
                    crossSeriesReducer: REDUCE_FRACTION_TRUE
                trigger:
                  count: 1
          YAML_EOF

            cat <<'YAML_EOF' >"${POLICY_DIR}/uptimeApi.yaml"
          displayName: "Saral API - uptime URL failing"
          combiner: OR
          conditions:
            - displayName: Uptime check_passed below 1
              conditionThreshold:
                filter: |
                  metric.type="monitoring.googleapis.com/uptime_check/check_passed"
                  resource.type="uptime_url"
                  resource.labels.project_id="saraljobviewer"
                  resource.labels.host="saralapi.thatinsaneguy.com"
                comparison: COMPARISON_LT
                thresholdValue: 1
                duration: 300s
                aggregations:
                  - alignmentPeriod: 300s
                    perSeriesAligner: ALIGN_NEXT_OLDER
                    crossSeriesReducer: REDUCE_FRACTION_TRUE
                trigger:
                  count: 1
          YAML_EOF

            cat <<'YAML_EOF' >"${POLICY_DIR}/api5xx.yaml"
          displayName: "saral-api - elevated 5xx request rate"
          combiner: OR
          conditions:
            - displayName: 5xx responses per second (aligned)
              conditionThreshold:
                filter: |
                  metric.type="run.googleapis.com/request_count"
                  resource.type="cloud_run_revision"
                  resource.labels.service_name="saral-api"
                  metric.labels.response_code_class="5xx"
                comparison: COMPARISON_GT
                thresholdValue: 0.02
                duration: 300s
                aggregations:
                  - alignmentPeriod: 60s
                    perSeriesAligner: ALIGN_RATE
                    crossSeriesReducer: REDUCE_SUM
                trigger:
                  count: 1
          YAML_EOF

            cat <<'YAML_EOF' >"${POLICY_DIR}/redisMemory.yaml"
          displayName: "Redis saral-memorystore-redis - high memory usage ratio"
          combiner: OR
          conditions:
            - displayName: usage_ratio above threshold
              conditionThreshold:
                filter: |
                  metric.type="redis.googleapis.com/stats/memory/usage_ratio"
                  resource.type="redis_instance"
                  resource.labels.instance_id="saral-memorystore-redis"
                  resource.labels.region="us-east1"
                comparison: COMPARISON_GT
                thresholdValue: 0.85
                duration: 600s
                aggregations:
                  - alignmentPeriod: 300s
                    perSeriesAligner: ALIGN_MAX
                    crossSeriesReducer: REDUCE_MAX
                trigger:
                  count: 1
          YAML_EOF

            policy_exists() {
              local title="$1"
              local n
              n="$(gcloud monitoring policies list --project="${PROJECT}" --format=json | jq --arg t "$title" '[.[]? | select(.displayName == $t)] | length')"
              [[ "${n}" -gt 0 ]]
            }

            ensure_policy() {
              local title="$1" file="$2"
              if policy_exists "${title}"; then
                echo "Alert policy exists: ${title}"
                return 0
              fi
              echo "Creating alert policy: ${title}"
              gcloud monitoring policies create \
                --project="${PROJECT}" \
                --notification-channels="${CHANNEL_NAME}" \
                --policy-from-file="${file}" \
                --quiet
            }

            ensure_policy "Saral UI - uptime URL failing" "${POLICY_DIR}/uptimeUi.yaml"
            ensure_policy "Saral API - uptime URL failing" "${POLICY_DIR}/uptimeApi.yaml"
            ensure_policy "saral-api - elevated 5xx request rate" "${POLICY_DIR}/api5xx.yaml"
            ensure_policy "Redis saral-memorystore-redis - high memory usage ratio" "${POLICY_DIR}/redisMemory.yaml"
          fi

          echo "Done: https://console.cloud.google.com/monitoring/dashboards?project=${PROJECT}"
