# Run:  docker compose up        (build if needed, run validation -1, stream logs, exit)
#       docker compose up -d     (detached: run then stop; use: docker compose logs dvalidate)
#       docker compose up --build
#
# Requires `.env` with MONGODB_URI, MONGODB_DATABASE, MIDHTECH_* (same as local validation.py).
# One-shot job: container stops when validation.py finishes. Re-run: docker compose up
services:
  dvalidate:
    build:
      context: .
      dockerfile: docker/Dockerfile.validation
    image: saral-dvalidate:local
    container_name: saral-dvalidate
    env_file:
      - .env
    command: ["-1"]
    init: true
