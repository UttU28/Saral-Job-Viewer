# Default: one-shot validation job (same as before).
#   docker compose up
#   docker compose up --build
#
# Local API + Redis (matches .env.example REDIS_URL=redis://sjv-redis:6379/0):
#   docker compose --profile dev up --build
#   docker compose --profile dev up -d
#
# Requires `.env` at repo root (see `.env.example`). For `api`, set at least
# MONGODB_URI, MONGODB_DATABASE, JWT_SECRET, MIDHTECH_*, GCP_* / RUN_JOB_NAME if
# you use admin job triggers; REDIS_* as needed.
#
# Optional: uncomment volumes on `api` to mount gcp-sa.json for local JobsClient.
services:
  sjv-redis:
    profiles: ["dev"]
    image: redis:7-alpine
    container_name: saral-sjv-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: saral-api:local
    container_name: saral-api-local
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - sjv-redis
    init: true
    # volumes:
    #   - ./gcp-sa.json:/app/secrets/gcp-sa.json:ro

  dvalidate:
    build:
      context: .
      dockerfile: docker/Dockerfile.validation
    image: saral-dvalidate:local
    container_name: saral-dvalidate
    env_file:
      - .env
    command: ["-1"]
    init: true
