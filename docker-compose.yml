# Saral Job Viewer — single stack. Deploy with: ./deploy.sh
#
#   https://saral.thatinsaneguy.com       → frontend
#   https://saral.thatinsaneguy.com/api/* → backend
#
# Requires `.env` at repo root (see `.env.example`).

name: saral-job-viewer

networks:
  sjv-net:
    driver: bridge

services:
  sjv-redis:
    build:
      context: .
      dockerfile: docker/Dockerfile.redis
    image: saral-redis:latest
    container_name: saral-redis
    networks:
      - sjv-net
    expose:
      - "9262"
    volumes:
      - sjv-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "9262", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: saral-api:latest
    container_name: saral-api
    networks:
      - sjv-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: redis://sjv-redis:9262/0
      VALIDATION_IMAGE: saral-dvalidate:latest
      VALIDATION_DOCKER_NETWORK: saral-job-viewer_sjv-net
      API_PORT: "9260"
    expose:
      - "9260"
    ports:
      - "127.0.0.1:9260:9260"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sjv-redis:
        condition: service_healthy
    init: true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    image: saral-ui:latest
    container_name: saral-ui
    networks:
      - sjv-net
    expose:
      - "9261"
    ports:
      - "127.0.0.1:9261:9261"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: saral-nginx
    networks:
      - sjv-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/generated/nginx.saral.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: saral-certbot
    networks:
      - sjv-net
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM;
          while :; do
            certbot renew --webroot -w /var/www/certbot --quiet;
            sleep 12h & wait $${!};
          done"
    restart: unless-stopped

volumes:
  sjv-redis-data:
  certbot-etc:
  certbot-webroot:
