# Nginx for Saral Job Viewer — saral.thatinsaneguy.com
# Placeholders __BACKEND_PORT__ and __FRONTEND_PORT__ are replaced by deploy.sh
#
# Routing:
#   /     → Vite preview (frontend)
#   /api/ → FastAPI (uvicorn); paths keep the /api prefix (app routes are /api/jobs, etc.)

server {
    server_name saral.thatinsaneguy.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:__FRONTEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # FastAPI serves /api/* as-is (do not strip /api — unlike Express backends that mount at /)
    location /api/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    listen 80;
}
